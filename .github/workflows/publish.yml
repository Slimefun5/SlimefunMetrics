name: Metrics Deployment

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Upload Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in pom
        run: sed -i "s/UNOFFICIAL/${{ steps.version.outputs.version }}/g" pom.xml

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Build with Maven
        run: mvn -B package

      - name: Create release and upload jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          ./target/SlimefunMetrics.jar
          --title "SlimefunMetrics $GITHUB_REF_NAME"
          --notes "Automated release of SlimefunMetrics $GITHUB_REF_NAME."
